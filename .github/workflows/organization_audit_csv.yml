name: GHEC EMU Migration Audit by CSV

on:
  workflow_dispatch:
    inputs:
      org_name:
        description: "Please provide an organization name"
        required: true
      repo_names:
        description: "Please provide a comma seperated list of repository names"
        required: true

jobs:
  repository-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab

      - name: Get Token
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@8e1ba3bf1619726336414f1014e37f17fbadf1db
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          organization: ${{ github.event.inputs.org_name }}

      - name: Run repository-audit on ${{ github.event.inputs.org_name }}
        uses: ./repository/repository
        id: repositories
        with:
          org: ${{ github.event.inputs.org_name }}
          repos: "${{ github.event.inputs.repo_names }}"
        env:
          GITHUB_TOKEN: ${{ steps.get_workflow_token.outputs.token }}

      - name: Upload ${{ github.event.inputs.org_name }} results
        uses: actions/upload-artifact@0b7f8abb1508181956e8e162db84b466c27e18ce
        with:
          name: ${{ github.event.inputs.org_name }}-repositories
          path: reports/
          retention-days: 1

  audit:
    runs-on: ubuntu-latest

    needs:
      - repository-audit

    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        composite-action:
          - action: repository/actions
            auth: githubapp
          - action: repository/actions-history
            auth: githubapp
          - action: repository/branch-protection-rules
            auth: githubapp
          - action: repository/discussions
            auth: githubapp
          - action: repository/environments
            auth: githubapp
          - action: repository/permissions
            auth: githubapp
          - action: repository/projects
            auth: githubapp
          - action: repository/teams
            auth: githubapp
          - action: repository/users
            auth: githubapp
          - action: repository/webhooks
            auth: githubapp
          - action: repository/ruleset
            auth: githubapp
          #- organization/actions
          - action: organization/apps
            auth: githubapp
          - action: organization/packages
            auth: pat
          # - organization/projects
          - action: organization/secrets
            auth: githubapp
          - action: organization/webhooks
            auth: githubapp


    steps:
      - name: Checkout
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab
        with:
          ref: ${{ github.ref_name }}

      - name: Download ${{ github.event.inputs.org_name }} repository-audit results
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a
        with:
          name: ${{ github.event.inputs.org_name }}-repositories
          path: reports

      - name: Get Token
        id: get_workflow_token
        if: ${{ matrix.composite-action.auth == 'githubapp' }}
        uses: peter-murray/workflow-application-token-action@8e1ba3bf1619726336414f1014e37f17fbadf1db
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          organization: ${{ github.event.inputs.org_name }}

      - name: Setup Node
        uses: actions/setup-node@64ed1c7eab4cce3362f8c340dee64e5eaeef8f7c
        with:
          node-version: 18
        if: ${{ matrix.composite-action.action == 'organization/actions' }}

      - name: Run ${{ matrix.composite-action.action }} on ${{ github.event.inputs.org_name }}
        if: ${{ matrix.composite-action.auth == 'githubapp' }}
        run: ./script.sh ${{ github.event.inputs.org_name }} "${{ github.workspace }}/reports/repos.json"
        shell: bash
        working-directory: ${{ matrix.composite-action.action }}
        env:
          GITHUB_TOKEN: ${{ steps.get_workflow_token.outputs.token }}

      - name: Run ${{ matrix.composite-action.action }} on ${{ github.event.inputs.org_name }}
        if: ${{ matrix.composite-action.auth == 'pat' }}
        run: ./script.sh ${{ github.event.inputs.org_name }} "${{ github.workspace }}/reports/repos.json"
        shell: bash
        working-directory: ${{ matrix.composite-action.action }}
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Upload ${{ matrix.composite-action.action }} results
        uses: actions/upload-artifact@0b7f8abb1508181956e8e162db84b466c27e18ce
        with:
          name: ${{ github.event.inputs.org_name }}-reports
          path: reports/
          retention-days: 1
