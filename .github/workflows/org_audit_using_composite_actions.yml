name: Org Migration assessment with Composite Actions

on:
  workflow_dispatch:
    inputs:
      ORG_NAME:
        description: "Please provide an org name"
        required: true
        default: "SolidifyDemo"
  workflow_call:
    inputs:
      ORG_NAME:
        type: string
        required: true

jobs:
  basic-data:
    uses: ./.github/workflows/job_api_call.yml
    with:
      ORG_NAME: ${{ inputs.ORG_NAME }}
      ACTION: './organization/repositories'
      ARTIFACTS: repos
    secrets: inherit

  create-issue:
    name: Manage Audit Issue
    runs-on: ubuntu-latest

    outputs:
      ISSUE_URL: ${{ steps.create-issue.outputs.ISSUE_URL }}

    permissions:
      contents: read
      issues: write

    steps:
