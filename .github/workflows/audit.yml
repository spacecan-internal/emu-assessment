name: Migration assessment

on:
  workflow_dispatch:
    inputs:
      org-name:
        description: "Please provide an org name"
        required: true
        default: "sparlant-demo-org"
    
env:
  PAT: ${{ secrets.PAT }}
  ORG_NAME: ${{ github.event.inputs.org-name }}

jobs:
  create-issue:
    name: Create Audit Issue
    runs-on: ubuntu-latest
    outputs:
      ISSUE_URL: ${{ steps.create-issue.outputs.ISSUE_URL }}
    steps:
      - name: Create Issue
        id: create-issue
        run: |
          ISSUE_URL=$(gh issue create --title "Assessment issue - $ORG_NAME" --body "" --repo $REPO)
          echo "ISSUE_URL=$ISSUE_URL" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
  lfs-audit:
    name: LFS Audit
    runs-on: ubuntu-latest
    needs: [create-issue]
    steps:
      - name: Checkout files
        uses: actions/checkout@v2
      - name: Build & Run
        run: |
          cd LFS_Audit
          go build .
          ./LFSAudit audit --org-name="$ORG_NAME" --pat-token="$PAT"
      - name: Comment Issue
        run: |
          RESULT=""
          RESULT+=$'\n\n# LFS \n```\n'
          RESULT+=$(cat ./LFS_Audit/repos_audited.txt)
          RESULT+=$'\n```\n\n'
          gh issue comment $ISSUE_URL --body "$RESULT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
  secrets-audit:
    name: Secrets Audit
    runs-on: ubuntu-latest
    needs: [create-issue]
    steps:
      - name: Checkout files
        uses: actions/checkout@v2
      - name: Run script
        run: |
          ./Secrets_Audit/secrets_audit.sh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
      - name: Run
        if: false
        run: |
          RESULT_ACTIONS_SECRETS=$'\n\n## Actions Secrets'
          RESULT_ACTIONS_SECRETS+=$'\n\n'
          RESULT_DEPENDANBOT_SECRETS=$'\n\n## Dependabot Secrets'
          RESULT_DEPENDANBOT_SECRETS+=$'\n\n'
          RESULT_CODESPACES_SECRETS=$'\n\n## Codespaces Secrets'
          RESULT_CODESPACES_SECRETS+=$'\n\n'

          REPOS=$(gh repo list $ORG_NAME --json name --jq '.[].name')
          while read -r repo ; do
              echo "Auditing repository $repo ..."
              REPO_ACTIONS_SECRETS=$(gh secret list --app actions --repo $ORG_NAME/$repo)
              REPO_DEPENDANBOT_SECRETS=$(gh secret list --app dependabot --repo $ORG_NAME/$repo)
              REPO_CODESPACES_SECRETS=$(gh secret list --app codespaces --repo $ORG_NAME/$repo)

              if [ "$REPO_ACTIONS_SECRETS" != "" ]; then
                  RESULT_ACTIONS_SECRETS+=$'\n\n### '
                  RESULT_ACTIONS_SECRETS+="$repo"
                  RESULT_ACTIONS_SECRETS+=$'\n\n```\n'
                  RESULT_ACTIONS_SECRETS+=$REPO_ACTIONS_SECRETS
                  RESULT_ACTIONS_SECRETS+=$'\n```\n\n'
              fi
              if [ "$REPO_DEPENDANBOT_SECRETS" != "" ]; then
                  RESULT_DEPENDANBOT_SECRETS+=$'\n\n### '
                  RESULT_DEPENDANBOT_SECRETS+="$repo"
                  RESULT_DEPENDANBOT_SECRETS+=$'\n\n```\n'
                  RESULT_DEPENDANBOT_SECRETS+=$REPO_DEPENDANBOT_SECRETS
                  RESULT_DEPENDANBOT_SECRETS+=$'\n```\n\n'
              fi
              if [ "$REPO_CODESPACES_SECRETS" != "" ]; then
                  RESULT_CODESPACES_SECRETS+=$'\n\n### '
                  RESULT_CODESPACES_SECRETS+="$repo"
                  RESULT_CODESPACES_SECRETS+=$'\n\n```\n'
                  RESULT_CODESPACES_SECRETS+=$REPO_CODESPACES_SECRETS
                  RESULT_CODESPACES_SECRETS+=$'\n```\n\n'
              fi
          done <<< $REPOS

          RESULT_SECRETS=$'\n\n# Secrets \n'
          RESULT_SECRETS+=$RESULT_ACTIONS_SECRETS
          RESULT_SECRETS+=$RESULT_DEPENDANBOT_SECRETS
          RESULT_SECRETS+=$RESULT_CODESPACES_SECRETS

          gh issue comment $ISSUE_URL --body "$RESULT_SECRETS"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
      - name: Comment Issue
        if: false
        run: |
          gh issue comment $ISSUE_URL --body-file RESULT_SECRETS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
  apps-audit:
    name: GitHub Apps Audit
    runs-on: ubuntu-latest
    needs: [create-issue]
    steps:
      - name: Checkout files
        uses: actions/checkout@v2
      - name: Run script
        run: |
          ./Apps_Audit/apps_audit.sh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
  permissions-audit:
    name: Permissions Audit
    runs-on: ubuntu-latest
    needs: [create-issue]
    steps:
      - name: Checkout files
        uses: actions/checkout@v2
      - name: Run script
        run: |
          ./Permissions_Audit/permissions_audit.sh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
  visibility-audit:
    name: Visibility Audit
    runs-on: ubuntu-latest
    needs: [create-issue]
    steps:
      - name: Checkout files
        uses: actions/checkout@v2
      - name: Run script
        run: |
          ./Visibility_Audit/visibility_audit.sh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}