name: Migration assessment

on:
  workflow_dispatch:
    inputs:
      org-name:
        description: "Please provide an org name"
        required: true
    
env:
  PAT: ${{ secrets.PAT }}
  ORG_NAME: ${{ github.event.inputs.org-name }}

jobs:
  create-issue:
    name: Create Audit Issue
    runs-on: ubuntu-latest
    outputs:
      ISSUE_URL: ${{ steps.create-issue.outputs.ISSUE_URL }}
    steps:
      - name: Create Issue
        id: create-issue
        run: |
          ISSUE_URL=$(gh issue create --title "Assessment issue - $ORG_NAME" --body "" --repo $REPO)
          echo "ISSUE_URL=$ISSUE_URL" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
  lfs-audit:
    name: LFS Audit
    runs-on: ubuntu-latest
    needs: [create-issue]
    steps:
      - name: Checkout files
        uses: actions/checkout@v2
      - name: Build & Run
        run: |
          cd LFS_Audit
          go build .
          ./LFSAudit audit --org-name="$ORG_NAME" --pat-token="$PAT"
      - name: Comment Issue
        run: |
          RESULT=""
          RESULT+=$'\n\n# LFS \n```\n'
          RESULT+=$(cat ./LFS_Audit/repos_audited.txt)
          RESULT+=$'\n```\n\n'
          gh issue comment $ISSUE_URL --body "$RESULT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}