      - uses: actions/upload-artifact@v3
        with:
          name: protections-${{ inputs.ORG_NAME }}
          path: protections.json
  packages-audit:
    name: Packages Audit
    runs-on: ubuntu-latest
    needs: [create-issue]
    steps:
      - name: Checkout files
        uses: actions/checkout@v3
      - name: Run script
        run: |
          ./Packages_Audit/packages_audit_json.sh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
          ORG_NAME: ${{ inputs.ORG_NAME }}
      - uses: actions/upload-artifact@v3
        with:
          name: packages-${{ inputs.ORG_NAME }}
          path: packages.json
  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [create-issue, lfs-audit, visibility-audit, permissions-audit, apps-audit, secrets-audit, projects-audit, environments-audit, discussions-audit, protections-audit, packages-audit]
    steps:
      - name: Checkout files
        uses: actions/checkout@v3
      - uses: actions/download-artifact@v3
        with:
          name: lfs-${{ inputs.ORG_NAME }}
      - uses: actions/download-artifact@v3
        with:
          name: visibility-${{ inputs.ORG_NAME }}
      - uses: actions/download-artifact@v3
        with:
          name: permissions-${{ inputs.ORG_NAME }}
      - uses: actions/download-artifact@v3
        with:
          name: apps-${{ inputs.ORG_NAME }}
      - uses: actions/download-artifact@v3
        with:
          name: secrets-${{ inputs.ORG_NAME }}
      - uses: actions/download-artifact@v3
        with:
          name: projects-${{ inputs.ORG_NAME }}
      - uses: actions/download-artifact@v3
        with:
          name: environments-${{ inputs.ORG_NAME }}
      - uses: actions/download-artifact@v3
        with:
          name: protections-${{ inputs.ORG_NAME }}
      - uses: actions/download-artifact@v3
        with:
          name: discussions-${{ inputs.ORG_NAME }}
      - uses: actions/download-artifact@v3
        with:
          name: packages-${{ inputs.ORG_NAME }}
      - name: Run script
        run: |
          ./report.sh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
          ORG_NAME: ${{ inputs.ORG_NAME }}
      - uses: actions/upload-artifact@v3
        with:
          name: org-${{ inputs.ORG_NAME }}
          path: org.json
      - uses: actions/upload-artifact@v3
        with:
          name: repositories-${{ inputs.ORG_NAME }}
          path: repositories.json
      - name: Run script
        run: |
          ./json-to-md.sh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
          ORG_NAME: ${{ inputs.ORG_NAME }}
      - uses: actions/upload-artifact@v3
        with:
          name: report-detailled-${{ inputs.ORG_NAME }}
          path: report.md
      - name: Run script
        run: |
          ./json-to-md-summary.sh
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
          ORG_NAME: ${{ inputs.ORG_NAME }}
      - name: Add comment (summary report)
        run: |
          gh issue edit "$ISSUE_URL" --body-file summary.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
          ORG_NAME: ${{ inputs.ORG_NAME }}
      - uses: actions/upload-artifact@v3
        with:
          name: report-${{ inputs.ORG_NAME }}
          path: summary.md
      - name: Add instruction
        run: |
          gh issue comment "$ISSUE_URL" --body-file instructions.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{needs.create-issue.outputs.ISSUE_URL}}
          ORG_NAME: ${{ inputs.ORG_NAME }}