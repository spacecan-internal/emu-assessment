name: Org Migration assessment

on:
  workflow_dispatch:
    inputs:
      ORG_NAME:
        description: "Please provide an org name"
        required: true
        default: "SolidifyDemo"
  workflow_call:
    inputs:
      ORG_NAME:
        type: string
        required: true

jobs:
  basic-data:
    uses: ./.github/workflows/job_api_call.yml
    with:
      ORG_NAME: ${{ inputs.ORG_NAME }}
      SCRIPT_PATH: ${GITHUB_WORKSPACE}/Data/repo-get-all.sh
      ARTIFACT_TYPE: repos
      JOB_NAME: get-repos
    secrets: inherit
                            
  create-issue:
    name: Manage Audit Issue
    runs-on: ubuntu-latest
    outputs:
      ISSUE_URL: ${{ steps.create-issue.outputs.ISSUE_URL }}
    steps:
      - name: Get Token
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@v2
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          organization: ${{ inputs.ORG_NAME }}

     
      - name: Delete Previous Issue
        run: |
          SEARCH='"Assessment issue - '
          SEARCH+="$ORG_NAME"
          SEARCH+='"'
          ISSUES=$(gh issue list --search "$SEARCH" --json url --repo "$REPO")
          while read -r issueUrl; do
            if [ "$issueUrl" != "" ];
            then
              gh issue close "$issueUrl"
            fi
          done <<< $(jq -c -r '.[].url' <<< "$ISSUES")
        env:
          GITHUB_TOKEN: ${{ steps.get_workflow_token.outputs.token }}
          REPO: ${{ github.repository }}
          ORG_NAME: ${{ inputs.ORG_NAME }}
            
      - name: Create Issue
        id: create-issue
        run: |
          ISSUE_URL=$(gh issue create --title "Assessment issue - $ORG_NAME" --body "" --repo $REPO)
          echo "ISSUE_URL=$ISSUE_URL" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ steps.get_workflow_token.outputs.token }}
          REPO: ${{ github.repository }}
          ORG_NAME: ${{ inputs.ORG_NAME }}

  secret-audit:
    uses: ./.github/workflows/job_api_call.yml
    needs: [create-issue, basic-data]
    with: 
      ORG_NAME: ${{ inputs.ORG_NAME }}
      SCRIPT_PATH: ${GITHUB_WORKSPACE}/Secrets_Audit/secrets_audit_json.sh
      ARTIFACT_TYPE: secrets
      JOB_NAME: get-secrets
      DOWNLOAD_ARTIFACT_NAME: repos-${{ inputs.ORG_NAME }}
    secrets: inherit
  
  apps-audit:
    uses: ./.github/workflows/job_api_call.yml
    needs: [create-issue]
    with: 
      ORG_NAME: ${{ inputs.ORG_NAME }}
      SCRIPT_PATH: ${GITHUB_WORKSPACE}/Apps_Audit/apps_audit_json.sh
      ARTIFACT_TYPE: apps
      JOB_NAME: get-apps
    secrets: inherit

  orghooks-audit:
