      - uses: actions/upload-artifact@v3
        with:
          name: packages
          path: packages.json   
  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [create-issue, lfs-audit, visibility-audit, permissions-audit, apps-audit, secrets-audit, projects-audit, environments-audit, discussions-audit, protections-audit, packages-audit]
    steps:
      - name: Checkout files
        uses: actions/checkout@v2
      - uses: actions/download-artifact@v3
        with:
          name: lfs
      - uses: actions/download-artifact@v3
